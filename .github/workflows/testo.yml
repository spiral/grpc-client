on:
    pull_request: null
    push:
        branches:
            - master
            - '*.*'

name: testo

jobs:
    testo:
        uses: spiral/gh-actions/.github/workflows/testo.yml@master
        with:
            extensions: sockets, grpc
            os: '["ubuntu-latest"]'
            php: '["8.2","8.3","8.4","8.5"]'
            run: 'composer test:ci'

